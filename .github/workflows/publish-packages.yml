name: Publish NuGet

# Publicação disparada por tag (ADR-0011/0014): criar a tag = publicar o pacote.
# Padrão de tag por pacote (MinVer calcula a versão a partir dela):
#   sharedkernel/v1.2.0   → Secco.SharedKernel 1.2.0
#   sdk/v0.1.0            → Secco.SDK.AspNetCore 0.1.0
#   sdk-efcore/v0.1.0     → Secco.SDK.EntityFrameworkCore 0.1.0
#   (futuros: logstream-client/v* — adicionar o mapeamento no passo "map")

on:
  push:
    tags:
      - "sharedkernel/v*"
      - "sdk/v*"
      - "sdk-efcore/v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # MinVer precisa do histórico completo e das tags para calcular a versão
          fetch-depth: 0

      - name: Map tag to project
        id: map
        run: |
          case "${GITHUB_REF_NAME}" in
            sharedkernel/v*) echo "project=src/SharedKernel/Secco.SharedKernel/Secco.SharedKernel.csproj" >> "$GITHUB_OUTPUT" ;;
            sdk/v*)          echo "project=src/SDK/Secco.SDK.AspNetCore/Secco.SDK.AspNetCore.csproj" >> "$GITHUB_OUTPUT" ;;
            sdk-efcore/v*)   echo "project=src/SDK/Secco.SDK.EntityFrameworkCore/Secco.SDK.EntityFrameworkCore.csproj" >> "$GITHUB_OUTPUT" ;;
            *) echo "Tag ${GITHUB_REF_NAME} sem mapeamento de pacote" >&2; exit 1 ;;
          esac

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Secco.Platform.slnx

      - name: Build
        run: dotnet build Secco.Platform.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Secco.Platform.slnx --no-build --configuration Release

      - name: Pack
        run: >
          dotnet pack ${{ steps.map.outputs.project }}
          --no-build --configuration Release --output ./artifacts

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate
